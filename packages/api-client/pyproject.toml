[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sidekick-api-client"
version = "0.1.0"
description = "Auto-generated Python client for the Sidekick API"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "attrs>=23.1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/sidekick_client"]

[tool.pytest.ini_options]
testpaths = ["tests"]
